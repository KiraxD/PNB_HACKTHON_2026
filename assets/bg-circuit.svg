<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b1a2f" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#f5a623" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <!-- Circuit nodes -->
  <circle cx="100" cy="80"  r="4" fill="#f5a623" opacity="0.5"/>
  <circle cx="200" cy="180" r="4" fill="#f5a623" opacity="0.5"/>
  <circle cx="350" cy="120" r="4" fill="#8b1a2f" opacity="0.6"/>
  <circle cx="500" cy="200" r="4" fill="#f5a623" opacity="0.5"/>
  <circle cx="650" cy="90"  r="4" fill="#f5a623" opacity="0.5"/>
  <circle cx="750" cy="250" r="4" fill="#8b1a2f" opacity="0.6"/>
  <circle cx="150" cy="350" r="4" fill="#f5a623" opacity="0.5"/>
  <circle cx="400" cy="400" r="6" fill="#8b1a2f" opacity="0.5"/>
  <circle cx="600" cy="350" r="4" fill="#f5a623" opacity="0.5"/>
  <circle cx="700" cy="500" r="4" fill="#f5a623" opacity="0.5"/>
  <circle cx="50"  cy="500" r="4" fill="#8b1a2f" opacity="0.6"/>
  <circle cx="300" cy="550" r="4" fill="#f5a623" opacity="0.5"/>
  <!-- Circuit lines -->
  <line x1="100" y1="80"  x2="200" y2="180" stroke="#8b1a2f" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="180" x2="350" y2="120" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <line x1="350" y1="120" x2="500" y2="200" stroke="#8b1a2f" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="200" x2="650" y2="90"  stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <line x1="650" y1="90"  x2="750" y2="250" stroke="#8b1a2f" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="350" x2="400" y2="400" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="400" x2="600" y2="350" stroke="#8b1a2f" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="350" x2="700" y2="500" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <line x1="50"  y1="500" x2="300" y2="550" stroke="#8b1a2f" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="180" x2="150" y2="350" stroke="#f5a623" stroke-width="0.8" opacity="0.2"/>
  <line x1="750" y1="250" x2="600" y2="350" stroke="#8b1a2f" stroke-width="0.8" opacity="0.2"/>
  <!-- L-shaped traces -->
  <polyline points="100,80 100,180 200,180"   fill="none" stroke="#8b1a2f" stroke-width="0.8" opacity="0.25"/>
  <polyline points="500,200 500,300 600,300 600,350" fill="none" stroke="#f5a623" stroke-width="0.8" opacity="0.25"/>
  <polyline points="350,120 350,60 650,60 650,90"    fill="none" stroke="#8b1a2f" stroke-width="0.8" opacity="0.2"/>
  <!-- IC chip outlines -->
  <rect x="320" y="370" width="80" height="50" fill="none" stroke="#8b1a2f" stroke-width="1" opacity="0.3" rx="3"/>
  <rect x="560" y="80"  width="60" height="40" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.3" rx="3"/>
  <rect x="60"  y="450" width="70" height="45" fill="none" stroke="#8b1a2f" stroke-width="1" opacity="0.3" rx="3"/>
</svg>
